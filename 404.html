<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Page Not Found – CCM Staff Apps</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/style/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/style/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/style/favicon-16x16.png">
  <link rel="manifest" href="/style/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pliant:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style/styles.css">
  <style>
    .nf-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px var(--pad) 48px;
    }
    .nf-code {
      font-size: clamp(72px, 18vw, 140px);
      font-weight: 700;
      line-height: 1;
      color: var(--accent);
    }
    .nf-title {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 600;
      color: #fff;
      margin: 8px 0 12px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }
    .nf-msg {
      max-width: 480px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 24px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    .nf-btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      padding: 11px 22px;
      border-radius: 8px;
      transition: filter 0.15s;
    }
    .nf-btn:hover { filter: brightness(1.1); }
  </style>
</head>

<body>

  <div class="logo-wrap">
    <img src="/style/ccm-logo.png" alt="Christian Community Ministries">
  </div>

  <main class="nf-wrap">
    <div class="nf-code">404</div>
    <h1 class="nf-title">Page not found</h1>
    <p class="nf-msg">
      Sorry, the page you were looking for doesn’t exist or may have moved.
      Please check the address, or head back to the main site.
    </p>
    <a class="nf-btn" href="https://www.ccmschools.edu.au">Return to ccmschools.edu.au</a>
  </main>

  <footer>
    <p>A ministry of <a href="https://www.ccmschools.edu.au">Christian Community Ministries</a></p>
  </footer>

</body>

</html>
